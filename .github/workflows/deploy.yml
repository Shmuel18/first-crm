name: Deploy (migrations + Vercel)

# Runs on every push to main. Goal: migrations land in Supabase BEFORE Vercel
# deploys code that depends on them. Without this, a PR that adds a column and
# uses it in a query can ship to Vercel before the column exists in prod,
# 500-ing every request that hits the new code path.
#
# PREREQUISITES (one-time setup):
#   1. Vercel project: Settings → Git → "Connected Git Repository" →
#      DISABLE "Automatically deploy on push to main". This workflow drives
#      the deploy now instead of Vercel's git integration.
#   2. GitHub repo: Settings → Secrets and variables → Actions → add:
#        - SUPABASE_ACCESS_TOKEN  (account-level personal access token,
#          generated at https://supabase.com/dashboard/account/tokens)
#        - SUPABASE_PROJECT_REF   (the project's ref ID, e.g. "abcdefghi")
#        - SUPABASE_DB_PASSWORD   (the project's DB password)
#        - VERCEL_TOKEN           (vercel.com → Account → Tokens)
#        - VERCEL_ORG_ID          (.vercel/project.json → orgId, after `vercel link`)
#        - VERCEL_PROJECT_ID      (.vercel/project.json → projectId)
#
# Anything destructive (CREATE EXTENSION, DROP COLUMN) should land via a PR
# that's been reviewed; this pipeline applies whatever's in supabase/migrations.
# Migrations 049-059 (the post-audit batch) are particularly sensitive — see
# their headers for pre-deploy cleanup queries.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply Supabase migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel env (prod)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
