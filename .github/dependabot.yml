version: 2
updates:
  # Weekly bump of npm deps. Group security-critical libraries together so a
  # CVE doesn't sit waiting for a separate PR. Group everything else by ecosystem
  # so review is one PR/week instead of dozens.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      security-critical:
        applies-to: version-updates
        patterns:
          - "@supabase/*"
          - "isomorphic-dompurify"
          - "file-type"
          - "googleapis"
          - "google-auth-library"
      next-stack:
        applies-to: version-updates
        patterns:
          - "next"
          - "next-intl"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tooling:
        applies-to: version-updates
        patterns:
          - "eslint*"
          - "prettier*"
          - "typescript"
          - "vitest"
          - "@types/node"
    # Pin majors for deps whose major version must match a runtime/framework.
    # Otherwise you get TS-green code that crashes at module-resolve time
    # — e.g., @types/node@25 surfaces APIs that don't exist in Node 20.
    ignore:
      # @types/node tracks the runtime Node version. CI + Vercel both run
      # Node 20. Allow minor/patch within ^20; reject any major bump.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # @types/react + @types/react-dom track React's major. We're on
      # React 19; a major bump here is only valid after upgrading React
      # itself (which the next-stack group catches separately).
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      # eslint-config-next major == Next.js major. Bumping it independently
      # of Next itself is incoherent.
      - dependency-name: "eslint-config-next"
        update-types: ["version-update:semver-major"]
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope
