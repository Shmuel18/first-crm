<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>אין חיבור · Kaufman Finance</title>
    <style>
      /* Fully self-contained: this page must render with no network (no external
         CSS/JS/font chunks), so all styles are inline and fonts fall back to the
         system stack. */
      html, body { height: 100%; margin: 0; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 16px; padding: 24px; text-align: center; box-sizing: border-box;
        background: #0A0A0A; color: #ffffff;
        font-family: 'Heebo', system-ui, -apple-system, 'Segoe UI', Arial, sans-serif;
      }
      img { width: 88px; height: 88px; }
      h1 { margin: 0; font-size: 20px; font-weight: 700; color: #E8C77B; }
      p { margin: 0; max-width: 320px; line-height: 1.6; color: #bdbdbd; font-size: 15px; }
      .en { font-size: 13px; color: #8f8f8f; }
      a.retry {
        display: inline-block; margin-top: 8px; padding: 10px 22px; border-radius: 8px;
        background: #C9A961; color: #0A0A0A; font-size: 15px; font-weight: 600;
        text-decoration: none;
      }
      a.retry:active { background: #B8945A; }
    </style>
  </head>
  <body>
    <img src="/icons/icon-192.png" alt="Kaufman Finance" />
    <h1>אין חיבור לאינטרנט</h1>
    <p>נראה שאינך מחובר כרגע. בדוק את החיבור ונסה שוב. הנתונים נטענים בזמן אמת ואינם נשמרים על המכשיר.</p>
    <p class="en" lang="en" dir="ltr">No internet connection. Check your connection and try again — data loads live and is not stored on the device.</p>
    <!-- A link, not JS: a navigation retry needs no inline handler, so it works
         under a strict CSP. href="" resolves to the CURRENT url — and the SW
         serves this page in place at the original destination (e.g. /cases/123),
         so clicking re-requests THAT url, not the home page. -->
    <a class="retry" href="" lang="he">נסה שוב · <span lang="en" dir="ltr">Retry</span></a>
  </body>
</html>
